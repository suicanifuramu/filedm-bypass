<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FileDM Bypass</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 640px; margin: 40px auto; padding: 0 16px;
    background: #f5f5f7; color: #1d1d1f;
  }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  .gh-link {
    position: fixed; top: 16px; right: 16px;
    color: #6e6e73; transition: color .2s;
  }
  .gh-link:hover { color: #1d1d1f; }
  p  { color: #6e6e73; margin-bottom: 24px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; }
  .row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1; padding: 10px 14px; border: 1px solid #d2d2d7;
    border-radius: 8px; font-size: 1rem; outline: none;
  }
  input[type="text"]:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.2); }
  button {
    padding: 10px 20px; border: none; border-radius: 8px;
    font-size: 1rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  button.primary  { background: #0071e3; color: #fff; }
  button.primary:hover  { background: #0077ed; }
  button.secondary { background: #e8e8ed; color: #1d1d1f; }
  button.secondary:hover { background: #d2d2d7; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  #result { margin-top: 20px; }
  .card {
    background: #fff; border-radius: 12px; padding: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 12px;
  }
  .card a {
    word-break: break-all; color: #0071e3; text-decoration: none;
  }
  .card a:hover { text-decoration: underline; }
  .error { color: #d32f2f; }
  .meta { font-size: .85rem; color: #6e6e73; margin-top: 4px; }
  #progress { margin-top: 16px; display: none; }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 3px solid #e8e8ed; border-top-color: #0071e3;
    border-radius: 50%; animation: spin .6s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<a class="gh-link" href="https://github.com/suicanifuramu/filedm-bypass" target="_blank" aria-label="GitHub">
  <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </svg>
</a>

<h1>FileDM Bypass</h1>

<label for="urlInput">FileDM URL</label>
<div class="row">
  <input type="text" id="urlInput"
         placeholder="https://filedm.com/...">
  <button class="primary" id="resolveBtn">Bypass</button>
</div>

<div id="progress">
  <span class="spinner"></span> resolving...
</div>

<div id="result"></div>

<script>
const input = document.getElementById("urlInput");
const resolveBtn = document.getElementById("resolveBtn");
const resultDiv = document.getElementById("result");
const progressDiv = document.getElementById("progress");

resolveBtn.addEventListener("click", async () => {
  const url = input.value.trim();
  if (!url) return;

  resultDiv.innerHTML = "";
  progressDiv.style.display = "block";
  resolveBtn.disabled = true;

  try {
    const res = await fetch("/api/resolve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Unknown error");

    resultDiv.innerHTML = `
      <div class="card">
        <a href="${data.directUrl}" target="_blank">${data.directUrl}</a>
        <div class="meta">If "The download has expired" appears, reload download page.</div>
      </div>
    `;
  } catch (err) {
    resultDiv.innerHTML = `<div class="card error"><strong>Error:</strong> ${err.message}</div>`;
  } finally {
    progressDiv.style.display = "none";
    resolveBtn.disabled = false;
  }
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") resolveBtn.click();
});
</script>

</body>
</html>
